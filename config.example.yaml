# hugr-agent configuration example.
# Copy to config.yaml and adjust to your environment.
# Secrets live in .env (referenced via ${VAR} below).

# ── Agent identity ──────────────────────────────────────────
agent:
  id: agt_ag01           # full agent ID (used in logs, events, IDs)
  short_id: ag01         # 4-char alias embedded in synthetic entity IDs
  name: hugr-data-agent
  type: hugr-data        # agent_type id — template of config/skills/constitution

# ── Embedded hugr engine ────────────────────────────────────
# Disable entirely (`enabled: false`) to run in hub mode where memory and
# LLM/embedding queries go through a remote Hugr instance.
hugr_local:
  enabled: true
  db:
    path: data/engine.db
    settings:
      max_memory: 4          # GB
      worker_threads: 2
      home_directory: data
      timezone: UTC

# ── Memory storage ──────────────────────────────────────────
memory:
  mode: local                # local (via hugr_local) | remote (via hugr_url)
  path: data/memory.db       # DuckDB file attached as "hub.db"
  hugr_url: ""                # required when mode=remote, e.g. http://hugr-hub:15000
  volatility_duration:
    stable: 8760h             # 365d
    slow: 2160h               # 90d
    moderate: 720h            # 30d
    fast: 168h                # 7d
    volatile: 24h             # 1d
  compaction_threshold: 0.7
  scheduler:
    interval: 5m
    review_delay: 30s
  consolidation:
    hypothesis_expiry: 720h

# ── LLM routing ─────────────────────────────────────────────
# mode=local registers each `models:` entry (type llm-*) in the embedded
# engine. Swap AGENT_MODEL in .env (or llm.model here) to pick a provider.
llm:
  mode: local                # local (via embedded engine) | remote (via HUGR_URL)
  model: gemma4-26b
  max_tokens: 8192
  temperature: 0.4
  routes:
    default: gemma4-26b
    # tool_calling: qwen3-27b     # route a specific intent to a cheaper model
    # summarization: gemma-small
  # Spec 006 phase 1: the compactor reads per-model context windows
  # so conversations on a small-window model compact earlier than on
  # a 1M-token one. Keys are the `models:` entry name; any unrouted
  # intent falls back to `default_budget`, then to a hard 128k floor.
  context_windows:
    gemma4-26b:   128000
    qwen3-27b:    100000    # LM Studio's qwen/qwen3.6-27b loaded with -c 100k
    gemma-4-27b:   50000    # gemma-4-27b loaded with -c 50k
    gpt-oss-20b:  128000
    gemma-small:    8192
  default_budget: 128000

# ── Embedding ───────────────────────────────────────────────
# REQUIRED external dependency (spec 006 §5d). Pinned at first run of
# data/memory.db via the `version` table — changing the model later
# without re-provisioning hub.db is a fatal startup error (existing
# vectors belong to the original model's space). Change `dimension`
# alongside `model`; a mismatch against a running embedder probe is
# also fatal.
embedding:
  mode: local                # local | remote
  model: gemma-embedding
  dimension: 768

# ── Skills ─────────────────────────────────────────────────
skills:
  path: ./skills

# ── LLM/Embedding data sources (mode=local only) ───────────
# Path format matches hugr's core.data_sources format:
# URL + query params; ${ENV_VAR} is expanded at registration.
# Types: llm-openai | llm-anthropic | llm-gemini | embedding
#
# Tip: mirror exactly what's registered in your Hugr instance
# (`{ core { data_sources { name type path } } }`) so the agent speaks the
# same source names in local mode and hub mode.
models:
  # Local LM Studio / vLLM / Ollama (OpenAI-compatible)
  - name: gemma4-26b
    type: llm-openai
    path: '${LLM_LOCAL_URL}?model="google/gemma-4-26b-a4b"&max_tokens=8192&thinking_budget=2048&timeout=10m'
  - name: gemma4-31b
    type: llm-openai
    path: '${LLM_LOCAL_URL}?model="google/gemma-4-31b"&max_tokens=8192&thinking_budget=2048&timeout=10m'
  - name: gpt-oss-20b
    type: llm-openai
    path: '${LLM_LOCAL_URL}?model="openai/gpt-oss-20b"&max_tokens=8192&thinking_budget=2048&timeout=10m'
  - name: gemma-small
    type: llm-openai
    path: '${LLM_LOCAL_URL}?model=gemma-4-e2b-it&timeout=120s'

  # Small-window local models — useful for specialist sub-agents
  # (cheap-model routes via llm.routes.tool_calling). Make sure the
  # context_windows entry above matches however you loaded the model
  # in LM Studio / vLLM / Ollama.
  - name: qwen3-27b
    type: llm-openai
    path: '${LLM_LOCAL_URL}?model="qwen/qwen3.6-27b"&max_tokens=8192&timeout=10m'
  - name: gemma-4-27b
    type: llm-openai
    path: '${LLM_LOCAL_URL}?model="google/gemma-4-27b"&max_tokens=8192&timeout=10m'

  # Local embedding (LM Studio — OpenAI-compatible /v1/embeddings)
  - name: gemma-embedding
    type: embedding
    path: '${EMBED_LOCAL_URL}?model="embeddinggemma-300m"&timeout=30s'

  # Cloud providers — uncomment after filling ${*_API_KEY} in .env
  # - name: gemini-pro-3-1
  #   type: llm-gemini
  #   path: 'https://generativelanguage.googleapis.com/v1beta?model=gemini-3.1-pro-preview&api_key="${GEMINI_API_KEY}"&max_tokens=4096&thinking_budget=2048&timeout=120s'
  # - name: claude-sonnet
  #   type: llm-anthropic
  #   path: 'https://api.anthropic.com/v1/messages?model=claude-sonnet-4-20250514&api_key="${ANTHROPIC_API_KEY}"&max_tokens=4096&thinking_budget=2048&timeout=60s'
  # - name: chatgpt-5-4-mini
  #   type: llm-openai
  #   path: 'https://api.openai.com/v1/chat/completions?model="gpt-5.4-mini-2026-03-17"&api_key="${OPENAI_API_KEY}"&max_tokens=4096&thinking_budget=2048&timeout=120s'
  # - name: text-embedding-3-small
  #   type: embedding
  #   path: 'https://api.openai.com/v1/embeddings?model=text-embedding-3-small&api_key="${OPENAI_API_KEY}"&timeout=10s'

# ── Mission graph (spec 007) ────────────────────────────────
# Coordinator-driven async mission DAG: planner decomposes the goal,
# scheduler promotes ready missions every 2 s, follow-up router reads
# user refinements while missions are in flight, completion marker
# re-enters the coordinator with a structured payload.
missions:
  # Follow-up routing: when a user message arrives during running
  # missions, classify whether it's a refinement of a specific one;
  # route the message into that child's transcript instead of spawning
  # a duplicate mission.
  follow_up_enabled: true                # off → every user msg goes through normal coord planning
  follow_up_similarity_threshold: 0.55   # classifier-confidence floor; below → no routing
  follow_up_tie_band: 0.05               # ambiguity slack above the floor; conf must exceed (threshold + tie_band)
  classifier_timeout: 3s                 # caps the single classifier LLM call; busy local LLM endpoints may need 30s

  # Restore: on boot, sub-agent rows whose last event is older than
  # this cutoff are marked abandoned (reason="restart: stale"). Too
  # short → live but slow missions die on every restart; too long →
  # operators wait minutes before stuck rows reap.
  stale_mission_timeout: 5m

  # spawn_sub_mission depth cap applied when the caller role's
  # max_depth is 0. Counts parent_session_id hops back to the
  # coordinator. Phase-1 dispatchers are at depth 1.
  max_spawn_depth_agent: 4
