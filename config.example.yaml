# hugr-agent configuration example.
# Copy to config.yaml and adjust to your environment.
# Secrets live in .env (referenced via ${VAR} below).

# ── Agent identity ──────────────────────────────────────────
agent:
  id: agt_ag01           # full agent ID (used in logs, events, IDs)
  short_id: ag01         # 4-char alias embedded in synthetic entity IDs
  name: hugr-data-agent
  type: hugr-data        # agent_type id — template of config/skills/constitution

# ── Embedded hugr engine ────────────────────────────────────
# Disable entirely (`enabled: false`) to run in hub mode where memory and
# LLM/embedding queries go through a remote Hugr instance.
hugr_local:
  enabled: true
  db:
    path: data/engine.db
    settings:
      max_memory: 4          # GB
      worker_threads: 2
      home_directory: data
      timezone: UTC

# ── Memory storage ──────────────────────────────────────────
memory:
  mode: local                # local (via hugr_local) | remote (via hugr_url)
  path: data/memory.db       # DuckDB file attached as "hub.db"
  hugr_url: ""                # required when mode=remote, e.g. http://hugr-hub:15000
  volatility_duration:
    stable: 8760h             # 365d
    slow: 2160h               # 90d
    moderate: 720h            # 30d
    fast: 168h                # 7d
    volatile: 24h             # 1d
  compaction_threshold: 0.7
  scheduler:
    interval: 5m
    review_delay: 30s
  consolidation:
    hypothesis_expiry: 720h

# ── LLM routing ─────────────────────────────────────────────
llm:
  mode: remote               # local = via hugr_local, remote = via HUGR_URL
  model: gemini-pro-3-1
  max_tokens: 8192
  temperature: 0.4
  routes:
    default: gemini-pro-3-1
    # tool_calling: claude-haiku
    # summarization: gemini-flash

# ── Embedding ───────────────────────────────────────────────
embedding:
  mode: remote               # local | remote
  model: ""                   # empty = disabled, FTS fallback only
  dimension: 384

# ── Skills ─────────────────────────────────────────────────
skills:
  path: ./skills

# ── LLM/Embedding data sources (mode=local only) ───────────
# Path format matches hugr's core.data_sources format:
# URL + query params; ${ENV_VAR} is expanded at registration.
# Types: llm-openai | llm-anthropic | llm-gemini | embedding
#
# Tip: mirror exactly what's registered in your Hugr instance
# (`{ core { data_sources { name type path } } }`) so the agent speaks the
# same source names in local mode and hub mode.
models:
  # Google Gemini
  - name: gemini-pro-3-1
    type: llm-gemini
    path: 'https://generativelanguage.googleapis.com/v1beta?model=gemini-3.1-pro-preview&api_key="${GEMINI_API_KEY}"&max_tokens=4096&thinking_budget=2048&timeout=120s'

