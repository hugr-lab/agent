# Session notes — LLM scratchpad during session
# ============================================================

"""Ephemeral notes saved by LLM during a session via memory_note tool. Survive context compaction, persist across agent restarts, cleaned up when session ends."""
type session_notes @table(name: "session_notes") @module(name: "agent") {
