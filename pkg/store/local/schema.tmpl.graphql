# ============================================================
# Session notes chain — view returning all notes visible to a
# session (own + ancestor chain). Drives Snapshot's `## Session
# notes` block; depth cap 8 mirrors session_events_chain.
# ============================================================

"""Recursive walk over parent_session_id (depth cap 8). Returns every note visible to the given session — own notes + every ancestor's notes (those addressed via memory_note(scope:'parent'|'ancestors')). Ordered by (chain_depth ASC, created_at DESC) so Snapshot renders own notes first, then by ancestry depth."""
type session_notes_chain @view(
  name: "session_notes_chain"
  sql: """
    WITH RECURSIVE chain AS (
      SELECT id, parent_session_id, 0 AS depth
      FROM [sessions]
      WHERE id = [$session_id]

      UNION ALL

      SELECT p.id, p.parent_session_id, c.depth + 1
      FROM [sessions] p
      JOIN chain c ON p.id = c.parent_session_id
      WHERE c.depth < 8
    )
    SELECT n.*, c.depth AS chain_depth
    FROM [session_notes] n
    JOIN chain c ON n.session_id = c.id
    ORDER BY c.depth ASC, n.created_at DESC
  """
) @args(name: "session_notes_chain_input", required: true) @module(name: "agent") {
  id:                String!
  agent_id:          String!
  session_id:        String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Session this note is visible in"
  )
  author_session_id: String @field_references(
    references_name: "sessions"
    field: "id"
    query: "author_session"
    description: "Session that wrote this note"
  )
  content:           String!
  created_at:        Timestamp
  """0 = own note, 1+ = ancestor session's note (visible because the ancestor was the addressed scope target)"""
  chain_depth:       Int!
}

"""Input for parameterized session_notes_chain view"""
input session_notes_chain_input {
  """Starting session ID — chain walks up from here"""
  session_id: String!
}

# ============================================================
# Session reviews — post-session analysis tracking
# ============================================================

"""Tracks whether a session has been reviewed by the post-session analyzer, and what was produced (facts, hypotheses, errors)."""
type session_reviews @table(name: "session_reviews") @module(name: "agent") {
  """Synthetic sortable ID: rev_{agent}_{ts}_{rnd}"""
  id:               String! @pk
  """Agent that performed this review"""
  agent_id:         String! @field_references(
    references_name: "agents"
    field: "id"
    query: "agent"
    description: "Agent that performed this review"
    references_query: "session_reviews"
    references_description: "Session reviews done by this agent"
  )
  """Session that was reviewed"""
  session_id:       String! @field_references(
    references_name: "sessions"
    field: "id"
    query: "session"
    description: "Session that was analyzed"
    references_query: "reviews"
    references_description: "Reviews of this session"
  )
  """Review lifecycle: pending|completed|skipped|failed"""
  status:           String  @default(value: "pending")
  """Number of new facts stored"""
  facts_stored:     Int     @default(value: "0")
  """Number of existing facts reinforced"""
  facts_reinforced: Int     @default(value: "0")
  """Number of hypotheses generated"""
  hypotheses_added: Int     @default(value: "0")
  """LLM model used for review"""
  model_used:       String
  """Total tokens consumed by review"""
  tokens_used:      Int     @default(value: "0")
  """When review was completed"""
  reviewed_at:      Timestamp
  """Error message if review failed"""
  error:            String
}

