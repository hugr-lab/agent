name: simple
session_id: scenario-simple-1

steps:
  - say: "Hi! Say hello in one short sentence."
    queries:
      - name: root_session_row
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              sessions(filter: {id: {eq: $sid}}) {
                id session_type status owner_id mission
              }
            }}}
          }
        vars:
          sid: scenario-simple-1

      - name: event_type_counts
        graphql: |
          query ($sid: String!) {
            jq(query: ".hub.db.agent.session_events | group_by(.event_type) | map({type: .[0].event_type, n: length})") {
              hub { db { agent {
                session_events(filter: {session_id: {eq: $sid}}) { event_type }
              }}}
            }
          }
        vars:
          sid: scenario-simple-1

      - name: event_order
        graphql: |
          query ($sid: String!) {
            hub { db { agent {
              session_events(
                filter: {session_id: {eq: $sid}}
                order_by: [{field: "seq", direction: ASC}]
              ) { seq event_type author }
            }}}
          }
        vars:
          sid: scenario-simple-1
