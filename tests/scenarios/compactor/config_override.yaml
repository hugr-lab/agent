llm:
  context_windows:
    gemma4-26b: 1500
    gemma-small: 1500
  default_budget: 1500

# Important: Compactor.usageRatio only sees req.Contents (user +
# agent messages) — NOT the system prompt or skill bodies. Budget
# 1500 / threshold 0.2 → triggers once ~300 tokens of user+agent
# text accumulate + len(contents) > MinTurns=4 (i.e. from turn 3
# onward if messages are long enough).
chatcontext:
  compaction_threshold: 0.2
