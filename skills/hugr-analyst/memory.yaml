# Memory categories for cross-domain analyses. The reviewer prefixes
# these with `hugr-analyst.` automatically (skill namespacing), so a
# `cross_domain_findings` fact extracted in this skill won't collide
# with `_memory.session_summary` or any future skill's category named
# `findings`.

categories:
  cross_domain_findings:
    description: >
      A durable insight derived from combining Hugr-sourced data
      across modules — a correlation, cohort comparison, trend
      callback, or anomaly worth remembering across sessions.
    volatility: slow
    initial_score: 0.7
    tags_hint: "metric_or_dataset"

  cohort_definition:
    description: >
      A reusable cohort definition the analyst converged on — the
      filter / aggregation shape that defines "EU enterprise tier"
      or "post-migration users". Useful when the same scoping recurs.
    volatility: stable
    initial_score: 0.6
    tags_hint: "cohort_name"

review:
  enabled: true
  min_tool_calls: 2  # at least one schema lookup + one data fetch
  # Pull approval_responded back into our review window — when the
  # user tweaks a query mid-flight via approval_respond(decision=
  # "modify"), the corrected args are evidence of preference and
  # should feed cross_domain_findings.
  include_event_types:
    - approval_responded
  prompt: |
    Extract durable cross-domain findings (cohort comparisons, trend
    interpretations, anomaly callouts) and cohort definitions worth
    reusing. Skip the data-fetch transcript chrome — focus on the
    analytical conclusion.
